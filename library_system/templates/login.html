<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Library Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="login-body">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="card p-4 p-md-5 shadow-lg border-0 rounded-4" style="max-width: 450px; width: 100%;">
            <div class="text-center mb-5">
                <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-circle mb-3">
                    <i class="bi bi-book-half fs-1 text-primary"></i>
                </div>
                <h1 class="fw-bold text-white mb-1">Library Admin</h1>
                <p class="text-muted small">Professional Management Portal</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} rounded-3 small py-2 border-0 mb-4">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="mb-4">
                    <label class="form-label small text-uppercase fw-bold"
                        style="letter-spacing: 0.5px;">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-subtle border-0 text-muted"><i
                                class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                    </div>
                </div>
                <div class="mb-5">
                    <label class="form-label small text-uppercase fw-bold"
                        style="letter-spacing: 0.5px;">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark-subtle border-0 text-muted"><i
                                class="bi bi-shield-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary d-block w-100 py-3 fw-bold rounded-3 shadow">
                    Authenticate Session
                </button>
            </form>

            <p class="text-center text-muted x-small mt-5 opacity-50">&copy; 2025 Library Automation System. All rights
                reserved.</p>
        </div>
    </div>
</body>

</html>
